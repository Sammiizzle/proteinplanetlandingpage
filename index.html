<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protein Planet | Mission Lone Star-1</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="pod-viewport">
        <div class="space-bg"></div>
        <div class="planet-layer"></div>
        <div class="pod-frame"></div>
        <div class="scanlines"></div>
    </div>

    <main class="hero-content">
        <header class="hud-top-bar">
            <div class="logo-section">
                <h1 class="logo-text">PROTEIN PLANET</h1>
                <span class="system-status"><span class="blink-dot"></span> SYSTEM: CRITICAL_STABILITY</span>
            </div>
            <div class="mission-timer">
                <span class="label">EST. ARRIVAL:</span>
                <div id="countdown">00:00:00:00</div>
            </div>
        </header>

        <div class="center-stage">
            <div class="hourglass-container">
                <div class="glass-vessel">
                    <div class="sand-bottom"></div>
                </div>
                <p class="status-tag">BIO-SYNTHESIS IN PROGRESS</p>
            </div>
        </div>

        <footer class="bottom-hud">
            <div class="terminal-box">
                <p class="analysis">INITIALIZING SCAN...</p>
                <p class="mission-id">LOC: [SECTOR 7] // SOURCE: LONE STAR-1</p>
            </div>
            
            <nav class="buttons">
                <a href="headquarters.html" class="btn">HEADQUARTERS</a>
                <a href="enlist.html" class="btn">ENLIST</a>
                <a href="mission-log.html" class="btn">MISSION LOG</a>
            </nav>
        </footer>

        <div class="corner-data top-left-data">O2_LVL: 14% // TEMP: -140C</div>
        <div class="corner-data bottom-right-data">LAT: 44.02 // LONG: 102.88</div>
    </main>

    <script src="script.js"></script>
</body>
</html>
