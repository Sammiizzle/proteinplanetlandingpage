<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protein Planet | Mission Lone Star-1</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div id="boot-screen">
        <div class="retina-scanner">
            <div class="eye-target"><div class="scan-line"></div></div>
            <p class="scan-status">AWAITING BIOMETRIC SCAN</p>
            <button id="auth-btn">AUTHORIZE MISSION LONE STAR-1</button>
        </div>
    </div>

    <div class="pod-viewport">
        <div class="planet-layer"></div>
        <div class="helmet-dash"></div>
        <div class="pod-frame"></div>
        <canvas id="particle-canvas"></canvas> </div>

    <main class="hero-content" style="display: none;">
        <div class="hud-header">
            <span class="system-tag">SYSTEMS: <span class="blink">ONLINE</span></span>
            
        <aside class="data-feed">
            <div class="terminal-box">
                <p class="analysis">INITIALIZING SCAN...</p>
                <div id="system-log"></div>
            </div>
        </aside>


        <nav class="lobby-menu">
            <h2 class="menu-header">WELCOME, CADET</h2>
            <div class="buttons">
                <a href="#" class="btn">HEADQUARTERS</a>
                <a href="#" class="btn">ENLIST</a>
                <a href="#" class="btn">MISSION LOG</a>
            </div>
        </nav>

        <footer class="hud-footer">
            <div id="countdown">00:00:00:00</div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
