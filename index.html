<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<meta name="description" content="Protein Planet – The protein revolution begins. Track the mission, explore the planet, and analyze the first extraterrestrial protein samples.">
<title>Protein Planet</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>
    <header class="main-header">
        <h2 class="logo-text">PROTEIN PLANET</h2>
    </header>

    <section class="hero">
        <div class="overlay"></div>
        
    <div class="hero-content">
        <div class="hud-top-bar">
    <div class="logo-section">
        <h2 class="logo-text">PROTEIN PLANET</h2>
        <span class="system-status">SYSTEM: ONLINE</span>
    </div>
            
    <div class="mission-timer">
        <span class="label">EST. ARRIVAL:</span>
        <div id="countdown">00:00:45:12</div>
    </div>

    <div class="hourglass-container">
    <div class="glass-vessel">
        <div class="sand-top"></div>
        <div class="sand-bottom"></div>
    </div>
    <p class="status-tag">STABILIZING</p>
    </div>

    <div class="center-col">
        <div id="countdown"></div>
        <p class="analysis">ANALYZING SAMPLE...</p>
    </div>

<div class="bottom-section">
    <div class="terminal-header">
        <span class="dot"></span> SECURE CONNECTION: ESTABLISHED
    </div>
    <p class="mission-id">SOURCE: [LONE STAR-1]</p>
    
    <div class="buttons">
        <a href="headquarters.html" class="btn"><span class="btn-glitch"></span>HEADQUARTERS</a>
        <a href="enlist.html" class="btn">ENLIST</a>
        <a href="mission-log.html" class="btn">MISSION LOG</a>
    </div>
</div>
</div>
    </section>

    <script src="script.js"></script>
</body>

</html>
